<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Arrows – Puzzle Escape</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <!-- Per-level splash -->
    <section id="splash-screen" class="screen">
      <div class="splash-center">
        <div class="logo">
          <span class="logo-tri" aria-hidden="true"></span><span class="logo-text">rrows</span>
        </div>
        <p class="splash-level">Seviye <span id="splash-level-num">1</span></p>

        <div class="daily-card">
          <div class="daily-card-head">
            <span class="daily-badge">Günlük Görev</span>
            <span class="daily-timer" id="daily-timer">--:--:--</span>
          </div>
          <p class="daily-status" id="daily-status">Bugünün özel görevini çöz ve hızını ölç!</p>
          <button id="btn-daily" class="play-btn secondary">Günlük Göreve Başla</button>
        </div>
      </div>
      <button id="btn-play" class="play-btn">Oyna</button>
    </section>

    <!-- Game -->
    <section id="game-screen" class="screen hidden">
      <header class="game-header">
        <div class="header-top">
          <div class="header-left">
            <button id="btn-back" class="circle-btn" title="Back">&#9664;</button>
            <button id="btn-restart" class="circle-btn" title="Restart">&#8635;</button>
          </div>
          <span class="header-level" id="header-level">
            <span id="level-title">Seviye <span id="game-level-num">1</span></span>
            <span id="daily-title" class="hidden">Günlük Görev</span>
          </span>
          <div class="header-right">
            <span id="daily-clock" class="daily-clock hidden">0:00.0</span>
          </div>
        </div>
        <div id="hearts" class="hearts"></div>
      </header>

      <div class="board-wrap">
        <svg id="board" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <footer class="game-footer"></footer>
    </section>

    <!-- Win overlay -->
    <div id="win-overlay" class="overlay hidden">
      <div class="overlay-card">
        <div class="overlay-tri" aria-hidden="true"></div>
        <h2 id="win-title">Seviye Tamamlandı!</h2>
        <p id="win-stats"></p>
        <div id="win-daily-info" class="win-daily-info hidden">
          <p class="win-daily-score" id="win-daily-score"></p>
          <p class="win-daily-next" id="win-daily-next"></p>
        </div>
        <button id="btn-next" class="play-btn">Devam</button>
      </div>
    </div>

    <!-- Out of hearts overlay -->
    <div id="lose-overlay" class="overlay hidden">
      <div class="overlay-card">
        <div class="overlay-tri" aria-hidden="true"></div>
        <h2>Canların Bitti</h2>
        <p>Bir nefes al ve tekrar dene.</p>
        <button id="btn-retry" class="play-btn">Tekrar Dene</button>
      </div>
    </div>

  </div>

  <script src="js/levels.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
