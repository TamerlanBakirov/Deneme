<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Knot Escape</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">

    <!-- Home -->
    <section id="home-screen" class="screen tab-screen">
      <div class="splash-center">
        <div class="logo">
          <span class="logo-knot" aria-hidden="true"></span><span class="logo-text">Knot Escape</span>
        </div>
        <p class="splash-level">Seviye <span id="splash-level-num">1</span></p>
      </div>
      <button id="btn-play" class="play-btn">Oyna</button>
    </section>

    <!-- Daily challenge -->
    <section id="challenge-screen" class="screen tab-screen hidden">
      <div class="tab-header"><h2>Günlük Görev</h2></div>
      <div class="splash-center">
        <div class="daily-card">
          <div class="daily-card-head">
            <span class="daily-badge">Günlük Görev</span>
          </div>
          <p class="daily-timer" id="daily-timer">--:--:--</p>
          <p class="daily-status" id="daily-status">Bugünün özel görevini çöz ve hızını ölç!</p>
          <button id="btn-daily" class="play-btn secondary">Günlük Göreve Başla</button>
        </div>
      </div>
    </section>

    <!-- Collection / level select -->
    <section id="collection-screen" class="screen tab-screen hidden">
      <div class="tab-header"><h2>Seviyeler</h2></div>
      <div class="level-grid" id="level-grid"></div>
      <div class="tab-header"><h2>Başarımlar</h2></div>
      <div class="achv-grid" id="achv-grid"></div>
    </section>

    <!-- Settings -->
    <section id="settings-screen" class="screen tab-screen hidden">
      <div class="tab-header"><h2>Ayarlar</h2></div>
      <div class="settings-list">
        <div class="settings-row">
          <span class="settings-label">Ses</span>
          <button class="toggle" id="toggle-sound" role="switch" aria-checked="true"><span class="toggle-knob"></span></button>
        </div>
        <div class="settings-row">
          <span class="settings-label">Titreşim</span>
          <button class="toggle" id="toggle-vibration" role="switch" aria-checked="true"><span class="toggle-knob"></span></button>
        </div>
        <div class="settings-row">
          <span class="settings-label">Karanlık Mod</span>
          <button class="toggle" id="toggle-dark" role="switch" aria-checked="false"><span class="toggle-knob"></span></button>
        </div>
        <div class="settings-row">
          <span class="settings-label">Renkli Oklar</span>
          <button class="toggle on" id="toggle-colors" role="switch" aria-checked="true"><span class="toggle-knob"></span></button>
        </div>
      </div>
      <div class="settings-list">
        <button class="settings-row settings-action" id="btn-how-to-play">
          <span class="settings-label">Nasıl Oynanır</span>
        </button>
        <button class="settings-row settings-action" id="btn-reset-progress">
          <span class="settings-label">İlerlemeyi Sıfırla</span>
        </button>
      </div>
    </section>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-btn active" data-tab="home">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5" /><path d="M5 10v10h14V10" /></svg>
        <span>Ana Sayfa</span>
      </button>
      <button class="nav-btn" data-tab="challenge">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="15" rx="2" /><path d="M4 9.5h16M8 3v3M16 3v3" /></svg>
        <span>Görev</span>
      </button>
      <button class="nav-btn" data-tab="collection">
        <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3.5" y="3.5" width="7" height="7" rx="1.4" /><rect x="13.5" y="3.5" width="7" height="7" rx="1.4" /><rect x="3.5" y="13.5" width="7" height="7" rx="1.4" /><rect x="13.5" y="13.5" width="7" height="7" rx="1.4" /></svg>
        <span>Seviyeler</span>
      </button>
      <button class="nav-btn" data-tab="settings">
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3" /><path d="M12 3v2.2M12 18.8V21M3 12h2.2M18.8 12H21M5.6 5.6l1.6 1.6M16.8 16.8l1.6 1.6M18.4 5.6l-1.6 1.6M7.2 16.8l-1.6 1.6" /></svg>
        <span>Ayarlar</span>
      </button>
    </nav>

    <!-- Game -->
    <section id="game-screen" class="screen hidden">
      <header class="game-header">
        <div class="header-top">
          <div class="header-left">
            <button id="btn-back" class="circle-btn" title="Back">&#9664;</button>
            <button id="btn-restart" class="circle-btn" title="Restart">&#8635;</button>
          </div>
          <span class="header-level" id="header-level">
            <span id="level-title">Seviye <span id="game-level-num">1</span></span>
            <span id="daily-title" class="hidden">Günlük Görev</span>
          </span>
          <div class="header-right">
            <span id="daily-clock" class="daily-clock hidden">0:00.0</span>
          </div>
        </div>
        <div id="hearts" class="hearts"></div>
      </header>

      <div class="board-wrap" id="board-wrap">
        <svg id="board" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <footer class="game-footer">
        <button id="btn-undo" class="footer-btn" disabled>
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 7 4 12l5 5" /><path d="M4 12h9a6 6 0 0 1 0 12h-2" /></svg>
          <span>Geri Al</span>
        </button>
        <button id="btn-hint" class="footer-btn">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a6 6 0 0 0-3.8 10.6c.6.5.8 1 .8 1.9v.5h6v-.5c0-.9.2-1.4.8-1.9A6 6 0 0 0 12 3z" /><path d="M9.5 20h5M10 22h4" /></svg>
          <span>İpucu</span>
        </button>
      </footer>
    </section>

    <!-- Win overlay -->
    <div id="win-overlay" class="overlay hidden">
      <div class="overlay-card">
        <div class="overlay-tri" aria-hidden="true"></div>
        <h2 id="win-title">Seviye Tamamlandı!</h2>
        <div id="win-stars" class="star-row hidden">
          <span class="star" data-i="0">★</span>
          <span class="star" data-i="1">★</span>
          <span class="star" data-i="2">★</span>
        </div>
        <p id="win-stats"></p>
        <div id="win-records" class="win-records hidden">
          <span class="win-record-item" id="win-record-time"></span>
          <span class="win-record-item" id="win-record-moves"></span>
        </div>
        <div id="win-daily-info" class="win-daily-info hidden">
          <p class="win-daily-score" id="win-daily-score"></p>
          <p class="win-daily-next" id="win-daily-next"></p>
        </div>
        <button id="btn-next" class="play-btn">Devam</button>
      </div>
    </div>

    <!-- Out of hearts overlay -->
    <div id="lose-overlay" class="overlay hidden">
      <div class="overlay-card">
        <div class="overlay-tri" aria-hidden="true"></div>
        <h2>Canların Bitti</h2>
        <p>Bir nefes al ve tekrar dene.</p>
        <button id="btn-retry" class="play-btn">Tekrar Dene</button>
      </div>
    </div>

    <!-- How-to-play tutorial -->
    <div id="tutorial-overlay" class="overlay hidden">
      <div class="overlay-card tutorial-card">
        <div class="tutorial-emoji" id="tutorial-emoji">🪢</div>
        <h2 id="tutorial-title">Nasıl Oynanır</h2>
        <p id="tutorial-text"></p>
        <div class="tutorial-dots" id="tutorial-dots"></div>
        <button id="btn-tutorial-next" class="play-btn">Devam</button>
      </div>
    </div>

  </div>

  <script src="js/levels.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
